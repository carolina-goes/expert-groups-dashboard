name: Update Expert Groups Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # 07:00 Lisbon (UTC+1)
  workflow_dispatch:        # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180    # 3 hours (member fetch takes ~1-2h)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run dashboard generator
        run: python scripts/generate_dashboard.py

      - name: Check if data changed
        id: check
        run: |
          git diff --quiet docs/index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)"
          git push
